[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.curl", "php82Extensions.zip", "php82Extensions.gd", "php82Packages.composer"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-scripts", "composer dump-autoload --optimize"]

[phases.build]
cmds = []

[start]
cmd = "php artisan package:discover --ansi; php artisan config:cache; php artisan route:cache; php artisan migrate --force; php -d variables_order=EGPCS -S 0.0.0.0:$PORT -t public"
