[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.curl", "php82Extensions.zip", "php82Extensions.gd", "php82Packages.composer"]

[phases.install]
cmds = [
  "mkdir -p bootstrap/cache storage/framework/cache storage/framework/sessions storage/framework/views storage/logs",
  "chmod -R 777 storage bootstrap/cache",
  "composer install --no-dev --optimize-autoloader --no-scripts --no-interaction",
  "composer dump-autoload --optimize --no-scripts"
]

[phases.build]
cmds = []

[start]
cmd = "php artisan package:discover --ansi || true && php artisan config:cache || true && php artisan route:cache || true && php artisan migrate --force || true && php -d variables_order=EGPCS -S 0.0.0.0:${PORT:-8000} -t public"
