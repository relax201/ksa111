[build]
builder = "nixpacks"

[deploy]
startCommand = "php artisan config:cache && php artisan migrate --force && php -d variables_order=EGPCS -S 0.0.0.0:$PORT -t public"
healthcheckPath = "/api/v1/market/overview"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
